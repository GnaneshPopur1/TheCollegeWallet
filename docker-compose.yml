version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: thewallet-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: thewallet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thewallet-backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@database:5432/thewallet?schema=public
      - JWT_SECRET=supersecretjwtkey_production_ready
      - PORT=3000
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thewallet-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
