name: The College Wallet CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm run install:all

    - name: Run Backend Tests & Prisma Validation
      env:
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/postgres"
        DIRECT_URL: "postgresql://postgres:password@localhost:5432/postgres"
      run: |
        cd backend
        npx prisma validate

    - name: Build Frontend
      run: |
        cd frontend
        npm run build
